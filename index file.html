<!DOCTYPE html>
<html lang="om">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamiso Online Business</title>

<style>
body {font-family:Arial;margin:0;background:#f4f6f9;}
header {background:#28a745;color:white;text-align:center;padding:20px;}
nav {background:#1e7e34;text-align:center;padding:10px;}
nav a {color:white;margin:10px;text-decoration:none;}

.section {padding:30px;text-align:center;}
.card {background:white;margin:10px;padding:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, button {padding:10px;margin:5px;width:80%;}
button {background:#28a745;color:white;border:none;border-radius:5px;cursor:pointer;}
button:hover {background:#1e7e34;}

.admin {display:none;}
.dashboard-card {background:white;margin:10px;padding:15px;border-radius:10px;}
.status {padding:5px 10px;color:white;border-radius:5px;font-size:12px;}
.pending {background:orange;}
.approved {background:green;}
.rejected {background:red;}
</style>

</head>

<body>

<header>
<h2>KAMISO ONLINE BUSINESS</h2>
</header>

<nav>
<a href="#" onclick="showHome()">Home</a>
<a href="#" onclick="showAdmin()">Admin</a>
</nav>

<!-- HOME -->
<div id="home">

<div class="section">
<h2>Kaffaltii Form</h2>

<p>?? 0917043688 | ?? 1000441655332</p>

<input id="name" placeholder="Maqaa">
<input id="phone" placeholder="Bilbila">
<input id="amount" placeholder="Qarshii">
<input id="tx" placeholder="Transaction ID">

<button onclick="submitPayment()">Ergi</button>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="admin">

<div class="section">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div class="section" id="dashboard"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== HOME ===== */
function submitPayment(){
  db.collection("payments").add({
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    amount: document.getElementById("amount").value,
    transaction: document.getElementById("tx").value,
    status: "pending"
  });

  alert("Ergameera ?");
}

/* ===== NAV ===== */
function showHome(){
  document.getElementById("home").style.display="block";
  document.getElementById("admin").style.display="none";
}

function showAdmin(){
  document.getElementById("home").style.display="none";
  document.getElementById("admin").style.display="block";
}

/* ===== LOGIN ===== */
function login(){
  firebase.auth().signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  ).then(()=>{
    loadDashboard();
  }).catch(e=>alert(e.message));
}

/* ===== DASHBOARD ===== */
function loadDashboard(){
  db.collection("payments").onSnapshot(snapshot=>{
    let html = "<h2>Dashboard</h2>";

    snapshot.forEach(doc=>{
      let d = doc.data();

      html += 
      <div class="dashboard-card">
        <h3>${d.name}</h3>
        <p>${d.phone}</p>
        <p>${d.amount}</p>
        <p>${d.transaction}</p>

        <span class="status ${d.status}">${d.status}</span><br><br>

        <button onclick="approve('${doc.id}')">Approve</button>
        <button onclick="reject('${doc.id}')">Reject</button>
      </div>
      ;
    });

    document.getElementById("dashboard").innerHTML = html;
  });
}

function approve(id){
  db.collection("payments").doc(id).update({status:"approved"});
}

function reject(id){
  db.collection("payments").doc(id).update({status:"rejected"});
}
</script>

</body>
</html>
